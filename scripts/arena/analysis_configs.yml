    pca_dims: 100
    base_window_size: 10
    base_window_stride: 10
    kmeans_ks: [3, 6, 2]
    gmm_ks: [2, 2, 2]
    raw_hdbscan_cluster_size: [10, 10, 10]
    tsne_kmeans_ks: [3, 3, 3]
    tsne_gmm_ks: [3, 3, 3]
    tsne_hdbscan_cluster_size: [10, 10, 10]

